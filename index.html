<!-- Chat Section (modal style) -->
<div id="chat-modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 transition-opacity">
  <div class="bg-gray-900 border border-gray-800 rounded-3xl w-full max-w-2xl h-[80vh] flex flex-col overflow-hidden shadow-2xl shadow-blue-500/20">
    <!-- Header -->
    <div class="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700">
      <h3 class="text-xl font-semibold">Chat with AI (Powered by Groq)</h3>
      <button id="close-chat" class="text-gray-400 hover:text-white text-2xl">&times;</button>
    </div>
    
    <!-- Messages -->
    <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-black/30">
      <!-- Messages will be added here -->
    </div>
    
    <!-- Input -->
    <div class="p-4 border-t border-gray-700 bg-gray-800">
      <form id="chat-form" class="flex gap-3">
        <input id="chat-input" type="text" placeholder="Type your message..." class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 transition" autocomplete="off">
        <button type="submit" class="px-6 py-4 bg-blue-600 hover:bg-blue-700 rounded-xl font-medium transition">Send</button>
      </form>
    </div>
  </div>
</div>

<!-- Chat Bubble (floating) -->
<button id="open-chat" class="fixed bottom-8 right-8 bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/40 hover:scale-110 transition text-3xl z-40">
  💬
</button>

<script>
// ... previous theme toggle script ...

// Chat functionality
const chatModal = document.getElementById('chat-modal');
const openChatBtn = document.getElementById('open-chat');
const closeChatBtn = document.getElementById('close-chat');
const chatForm = document.getElementById('chat-form');
const chatInput = document.getElementById('chat-input');
const messagesDiv = document.getElementById('chat-messages');

let messages = []; // history

openChatBtn.addEventListener('click', () => {
  chatModal.classList.remove('hidden');
  chatModal.classList.add('flex');
  chatInput.focus();
});

closeChatBtn.addEventListener('click', () => {
  chatModal.classList.add('hidden');
  chatModal.classList.remove('flex');
});

// Add message to UI
function addMessage(content, isUser = false) {
  const msg = document.createElement('div');
  msg.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
  msg.innerHTML = `
    <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-200'} max-w-[80%] p-4 rounded-2xl ${isUser ? 'rounded-br-none' : 'rounded-bl-none'}">
      ${content}
    </div>
  `;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Handle form submit
chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const userMsg = chatInput.value.trim();
  if (!userMsg) return;

  addMessage(userMsg, true);
  messages.push({ role: 'user', content: userMsg });
  chatInput.value = '';

  // Show loading
  const loadingMsg = document.createElement('div');
  loadingMsg.className = 'flex justify-start';
  loadingMsg.innerHTML = `<div class="bg-gray-800 text-gray-200 max-w-[80%] p-4 rounded-2xl rounded-bl-none animate-pulse">Thinking...</div>`;
  messagesDiv.appendChild(loadingMsg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'jg gjsiydydidigdihdhdiydit', // <-- এখানে তোর Groq API key paste কর
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: messages,
        temperature: 0.7,
        max_tokens: 1024
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0]) {
      const aiReply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: aiReply });

      // Remove loading
      messagesDiv.removeChild(loadingMsg);

      addMessage(aiReply);
    } else {
      throw new Error('No response');
    }
  } catch (err) {
    messagesDiv.removeChild(loadingMsg);
    addMessage('Error: Could not get response. Check console or API key.', false);
    console.error(err);
  }
});
</script>
